    function copyTextToClipboard(text, callback) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(callback).catch(() => fallbackCopy(text, callback));
        } else {
            fallbackCopy(text, callback);
        }
    }

    function fallbackCopy(text, callback) {
        var textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
        } catch (err) {}
        document.body.removeChild(textArea);
        if(callback) callback();
    }

    function setupCustomDropdown(wrapper, display, optionsContainer, dataList, placeholder, onChangeCallback) {
        dataList.forEach(item => {
            const div = document.createElement('div');
            div.className = 'custom-option';
            div.textContent = item;
            div.dataset.value = item;
            
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                optionsContainer.querySelectorAll('.custom-option').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                display.textContent = item;
                display.classList.remove('active');
                optionsContainer.classList.remove('open');
                onChangeCallback(item);
            });
            optionsContainer.appendChild(div);
        });

            document.querySelectorAll('.custom-select').forEach(el => el.classList.remove('active'));
            
            if (!isOpen) {

                display.classList.add('active');
                const selected = optionsContainer.querySelector('.selected');
                if (selected) {
                    selected.scrollIntoView({ block: 'center', behavior: 'instant' });
                }
            }
        });
    }

            }
        } else {
            libButtonsContainer.innerHTML = '<div class="empty-msg">전집을 선택하시면 여기에 도서관 버튼이 나타납니다.</div>';
        }
    });

    const allLibs = Object.keys(libData).sort();
    setupCustomDropdown(libWrapper, libDisplay, libOptions, allLibs, "이곳을 눌러 도서관을 선택하세요", (selectedLib) => {
        bookListContainer.innerHTML = ''; 
        
        if (selectedLib && libData[selectedLib]) {
            bookListContainer.style.display = 'grid'; 
            const books = libData[selectedLib];
            
            books.forEach(book => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.textContent = book;
                div.title = "클릭하시면 책 이름이 복사됩니다!"; 
                
                // 스마트 핵심 키워드 불러오기
                const searchKeyword = keywordMap[book];
                
                div.addEventListener('click', function() {
                    copyTextToClipboard(searchKeyword, function() {
                        alert(`띄어쓰기 오류 방지를 위해 핵심 단어만 복사했습니다.\n\n['${searchKeyword}'] 복사 완료!`);
                    });
                });

                bookListContainer.appendChild(div);
            });
            
            if(libLinks[selectedLib]) {
                libDirectBtn.href = libLinks[selectedLib];
                libDirectBtn.textContent = selectedLib + ' 전집 검색링크 이동 ↗';
                libDirectBtn.style.display = 'block';
            } else {
                libDirectBtn.style.display = 'none';
            }
            
        } else {
            bookListContainer.style.display = 'none';
            libDirectBtn.style.display = 'none';
        }
    });
</script>

</body>
</html>
